<script>
const wordsData = [
{
word:"Constitución",
syllables:"cons-ti-tu-ción",
count:"4",
stress:"Aguda",
vowels:"Diptongo iu"
},
{
word:"vergüenza",
syllables:"ver-güen-za",
count:"3",
stress:"Llana",
vowels:"Diptongo üe"
},
{
word:"arqueología",
syllables:"ar-que-o-lo-gí-a",
count:"6",
stress:"Esdrújula",
vowels:"Hiato ía"
},
{
word:"reunión",
syllables:"reu-nión",
count:"2",
stress:"Aguda",
vowels:"Diptongo eu"
},
{
word:"demuéstramelo",
syllables:"de-mués-tra-me-lo",
count:"5",
stress:"Sobresdrújula",
vowels:"Diptongo ue"
}
];

let currentIndex = 0;
let attempts = 0;
const maxAttempts = 5;

let spanishVoice = null;

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  spanishVoice = voices.find(v => v.lang.startsWith("es"));
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak(text){
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "es-ES";
  utterance.rate = 0.9;
  if (spanishVoice) {
    utterance.voice = spanishVoice;
  }
  speechSynthesis.speak(utterance);
}

function speakWord(){
  speak(wordsData[currentIndex].word);
}

function normalize(s){
  return s.trim().toLowerCase();
}

function clearInputs(){
  document.querySelectorAll("input").forEach(i => i.value = "");
}

function nextWord(){
  attempts = 0;
  currentIndex++;
  if(currentIndex >= wordsData.length){
    document.getElementById("feedback").innerHTML = "🎉 Terminaste el ejercicio.";
    speak("Has terminado el ejercicio.");
    return;
  }
  clearInputs();
  setTimeout(speakWord, 600);
}

function check(){
  const data = wordsData[currentIndex];
  const feedback = document.getElementById("feedback");

  const spelling = normalize(document.getElementById("spelling").value);
  const syllables = normalize(document.getElementById("syllables").value);
  const count = normalize(document.getElementById("count").value);
  const stress = normalize(document.getElementById("stress").value);
  const vowels = normalize(document.getElementById("vowels").value);

  let wrong = [];

  if(spelling !== normalize(data.word)) wrong.push("1");
  if(syllables !== normalize(data.syllables)) wrong.push("2");
  if(count !== normalize(data.count)) wrong.push("3");
  if(stress !== normalize(data.stress)) wrong.push("4");
  if(!vowels.includes(normalize(data.vowels.split(" ")[0]))) wrong.push("5");

  if(wrong.length === 0){
    feedback.innerHTML = "✅ Todo correcto. Siguiente palabra.";
    speak("Correcto");
    nextWord();
  } else {
    attempts++;
    if(attempts < maxAttempts){
      feedback.innerHTML = "❌ Categorías incorrectas: " + wrong.join(", ");
      speak("Intenta otra vez");
      speakWord();
    } else {
      feedback.innerHTML =
      "❌ 5 intentos fallidos.<br><br>" +
      "<strong>Corrección:</strong><br>" +
      "Palabra: " + data.word + "<br>" +
      "Sílabas: " + data.syllables + "<br>" +
      "Número: " + data.count + "<br>" +
      "Clasificación: " + data.stress + "<br>" +
      "Vocales: " + data.vowels;
      speak("Cinco intentos fallidos");
      nextWord();
    }
  }
}

setTimeout(speakWord, 1000);
</script>
