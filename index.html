let currentIndex = 0;
let attempts = 0;
const maxAttempts = 5;

let spanishVoice = null;

function loadSpanishVoice() {
  const voices = speechSynthesis.getVoices();

  // Try to find any Spanish voice
  spanishVoice = voices.find(v => v.lang.toLowerCase().startsWith("es"));

  // If none found, try fallback variants
  if (!spanishVoice) {
    spanishVoice = voices.find(v => v.lang.includes("ES") || v.lang.includes("MX"));
  }
}

// Important: wait until voices are loaded
speechSynthesis.onvoiceschanged = loadSpanishVoice;

// Call once in case voices are already available
loadSpanishVoice();

function speak(text) {
  const utterance = new SpeechSynthesisUtterance(text);

  if (spanishVoice) {
    utterance.voice = spanishVoice;
  }

  utterance.lang = "es-ES";
  utterance.rate = 0.9;
  utterance.pitch = 1;

  speechSynthesis.cancel(); // stop overlapping speech
  speechSynthesis.speak(utterance);
}
function speakWord(){
  speak(wordsData[currentIndex].word);
}

function normalize(s){
  return s.trim().toLowerCase();
}

function clearInputs(){
  document.querySelectorAll("input").forEach(i=>i.value="");
}

function updateProgress(){
  document.getElementById("progress").innerText =
    "Palabra " + (currentIndex+1) + " de " + wordsData.length;
}

function nextWord(){
  attempts = 0;
  currentIndex++;

  if(currentIndex >= wordsData.length){
    document.getElementById("feedback").innerHTML="🎉 Terminaste el ejercicio.";
    speak("Has terminado el ejercicio");
    return;
  }

  clearInputs();
  updateProgress();
  setTimeout(speakWord,600);
}

function check(){
  const data = wordsData[currentIndex];
  const feedback = document.getElementById("feedback");

  const spelling = normalize(document.getElementById("spelling").value);
  const syllables = normalize(document.getElementById("syllables").value);
  const count = normalize(document.getElementById("count").value);
  const stress = normalize(document.getElementById("stress").value);
  const vowels = normalize(document.getElementById("vowels").value);

  let wrong=[];

  if(spelling !== normalize(data.word)) wrong.push("1");
  if(syllables !== normalize(data.syllables)) wrong.push("2");
  if(count !== normalize(data.count)) wrong.push("3");
  if(stress !== normalize(data.stress)) wrong.push("4");
  if(!vowels.includes(normalize(data.vowels.split(" ")[0]))) wrong.push("5");

  if(wrong.length===0){
    feedback.innerHTML="✅ Correcto. Siguiente palabra.";
    speak("Correcto");
    nextWord();
  } else {
    attempts++;
    if(attempts < maxAttempts){
      feedback.innerHTML="❌ Categorías incorrectas: "+wrong.join(", ");
      speak("Intenta otra vez");
      speakWord();
    } else {
      feedback.innerHTML=
      "❌ 5 intentos fallidos.<br><br>"+
      "<strong>Corrección:</strong><br>"+
      "Palabra: "+data.word+"<br>"+
      "Sílabas: "+data.syllables+"<br>"+
      "Número: "+data.count+"<br>"+
      "Clasificación: "+data.stress+"<br>"+
      "Vocales: "+data.vowels;
      speak("Cinco intentos fallidos");
      nextWord();
    }
  }
}

updateProgress();
setTimeout(speakWord,800);

</script>

</body>
</html>
